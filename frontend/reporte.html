<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte - Parte Diario</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        .rpt-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap; gap:0.5rem; }
        .rpt-title { font-size:1rem; font-weight:700; }

        .sec { margin-bottom:0.75rem; }
        .sec-titulo {
            font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
            padding:0.3rem 0.5rem; background:var(--primary-light); color:var(--primary);
            border:1px solid var(--border); border-bottom:none; border-radius:var(--radius) var(--radius) 0 0;
        }
        .sec-body { border:1px solid var(--border); border-radius:0 0 var(--radius) var(--radius); overflow:hidden; }
        .sec-body table { margin:0; table-layout:fixed; width:100%; }
        .sec-body th { background:var(--bg-card-hover); font-size:0.55rem; padding:0.2rem 0.4rem; overflow:hidden; }
        .sec-body td { font-size:0.7rem; padding:0.2rem 0.4rem; vertical-align:top; border-bottom:1px solid var(--border); overflow:hidden; }
        .sec-body tr:last-child td { border-bottom:none; }
        .sec-body .dom { font-family:monospace; font-weight:700; font-size:0.7rem; white-space:nowrap; }
        .sec-body .fch { white-space:nowrap; color:var(--text-muted); font-size:0.65rem; }
        .sec-body .obs { font-size:0.6rem; color:var(--text-muted); word-break:break-word; }
        .sec-empty { padding:0.4rem; text-align:center; color:var(--text-muted); font-size:0.65rem; }

        /* Anchos fijos uniformes para todas las secciones */
        .col-ing { width:6%; }
        .col-dom { width:10%; }
        .col-nov { width:42%; }
        .col-tal { width:10%; }
        .col-est { width:12%; }
        .col-obs { width:20%; }

        /* Desperfectos inline compactos */
        .d-row { display:flex; align-items:center; gap:2px; margin:1px 0; }
        .d-row .badge { font-size:0.45rem; width:60px; justify-content:center; display:inline-flex; padding:1px 3px; }
        .d-row .d-est { width:55px; }
        .d-row .d-txt { font-size:0.65rem; }

        @media print {
            body { background:#fff; color:#000; font-size:9px; }
            .navbar, .no-print { display:none !important; }
            .container { padding:0.25rem; }
            .sec-titulo { background:#e8f5e9; color:#1b5e20; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
            .sec-body th { background:#f5f5f5; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
            .sec-body { border-color:#bbb; }
            td, th { border-bottom-color:#ddd; }
            .badge { border:1px solid #aaa; }
            .p-hdr { display:block !important; margin-bottom:6px; }
            .p-hdr h2 { font-size:12px; margin:0; }
            .p-hdr p { font-size:9px; color:#666; margin:1px 0 0; }
        }
        .p-hdr { display:none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>&#128668; Parte Diario</h1>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/coordinacion.html">Coordinacion</a>
            <a href="/taller.html">Taller</a>
            <a href="/reporte.html" class="active">Reporte</a>
        </div>
    </nav>

    <div class="container">
        <!-- Contenedor para captura de imagen -->
        <div id="captura">
        <div class="img-hdr" id="img-hdr" style="display:none; padding:0.5rem 0; margin-bottom:0.5rem; border-bottom:2px solid var(--primary);">
            <div style="font-size:1rem; font-weight:700;">&#128668; Parte Diario - Logiteck</div>
            <div style="font-size:0.75rem; color:var(--text-muted);" id="img-fecha"></div>
        </div>

        <div class="p-hdr"><h2>Parte Diario - Logiteck</h2><p id="p-fecha"></p></div>

        <div class="rpt-header no-print">
            <div class="rpt-title">Reporte Parte Diario</div>
            <div style="display:flex;gap:0.4rem;align-items:center;">
                <input type="date" class="form-control" id="inp-fecha" style="width:145px;padding:0.3rem 0.5rem;font-size:0.8rem;">
                <button class="btn btn-primary btn-sm" onclick="cargarReporte()">Generar</button>
                <button class="btn btn-outline btn-sm" onclick="window.print()">&#128424;</button>
                <button class="btn btn-success btn-sm" onclick="descargarImagen()">&#128247; Imagen</button>
            </div>
        </div>

        <div id="rpt"></div>
        </div><!-- /captura -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        const inp = document.getElementById('inp-fecha');
        inp.value = new Date().toISOString().split('T')[0];
        window.cargarReporte = cargarReporte;
        cargarReporte();

        async function cargarReporte() {
            const fecha = inp.value;
            if (!fecha) return;
            document.getElementById('p-fecha').textContent = fmtLarga(fecha);
            document.getElementById('img-fecha').textContent = fmtLarga(fecha);
            try {
                const partes = await fetch('/api/partes').then(r => r.json());
                const det = await Promise.all(partes.map(p => fetch(`/api/partes/${p.id}`).then(r => r.json()).catch(() => p)));
                render(det);
            } catch { document.getElementById('rpt').innerHTML = '<div class="sec-empty">Error</div>'; }
        }

        function render(partes) {
            const ext = partes.filter(p => p.tipo_taller === 'EXTERNO' && p.estado !== 'Operativo' && p.ingreso_confirmado);
            const int_ = partes.filter(p => p.tipo_taller === 'INTERNO' && p.estado !== 'Operativo' && p.ingreso_confirmado);
            const pend = partes.filter(p => !p.ingreso_confirmado && p.estado !== 'Operativo');
            const ops = partes.filter(p => p.estado === 'Operativo');

            document.getElementById('rpt').innerHTML =
                sec('TALLERES EXTERNOS', ext, true) +
                sec('TALLERES INTERNOS', int_, true) +
                sec('PENDIENTES DE INGRESO', pend, false) +
                sec('REPARACIONES FINALIZADAS', ops, false);
        }

        function sec(titulo, partes, conObs) {
            const cols = conObs ? 6 : 5;
            let rows;
            if (partes.length === 0) {
                rows = `<tr><td colspan="${cols}" class="sec-empty">-</td></tr>`;
            } else {
                rows = partes.map(p => {
                    const fi = p.fecha_ingreso ? fmtCorta(p.fecha_ingreso) : '-';
                    const tl = p.tipo_taller === 'EXTERNO' && p.taller_externo ? p.taller_externo : (p.taller_box || '-');
                    const nov = p.desperfectos && p.desperfectos.length > 0
                        ? p.desperfectos.map(d =>
                            `<div class="d-row"><span class="badge badge-${sc(d.sector)}">${esc(d.sector)}</span><span class="badge badge-${ec(d.estado)} d-est">${esc(d.estado)}</span><span class="d-txt">${esc(d.descripcion)}</span></div>`
                        ).join('')
                        : `<span class="d-txt">${esc(p.novedad) || '-'}</span>`;
                    return `<tr>
                        <td class="fch">${fi}</td>
                        <td class="dom">${esc(p.dominio)}</td>
                        <td>${nov}</td>
                        <td style="font-size:0.65rem;">${tl}</td>
                        <td><span class="badge badge-${ec(p.estado)}" style="font-size:0.5rem;">${p.estado}</span></td>
                        ${conObs ? `<td class="obs">${esc(p.observaciones)}</td>` : ''}
                    </tr>`;
                }).join('');
            }
            return `<div class="sec">
                <div class="sec-titulo">${titulo} (${partes.length})</div>
                <div class="sec-body"><table><thead><tr>
                    <th class="col-ing">INGRESO</th>
                    <th class="col-dom">DOMINIO</th>
                    <th class="${conObs ? 'col-nov' : ''}" style="${conObs ? '' : 'width:54%;'}">NOVEDAD</th>
                    <th class="col-tal">TALLER</th>
                    <th class="col-est">ESTADO</th>
                    ${conObs ? '<th class="col-obs">OBS.</th>' : ''}
                </tr></thead><tbody>${rows}</tbody></table></div>
            </div>`;
        }

        function esc(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function sc(s) { return { 'MECANICA':'info','ELECTRICIDAD':'warning','HERRERIA':'muted','GOMERIA':'success','LAVADERO':'primary' }[(s||'').toUpperCase()] || 'muted'; }
        function ec(e) { return { 'Pendiente':'warning','Pendiente de Ingreso':'muted','En Proceso':'info','En Espera':'orange','Reparado':'success','Operativo':'success','No Aplica':'muted' }[e] || 'muted'; }
        function fmtCorta(d) { return new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); }
        function fmtLarga(d) { const t=new Date(d+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); return t.charAt(0).toUpperCase()+t.slice(1); }

        window.descargarImagen = async function() {
            const el = document.getElementById('captura');
            const imgHdr = document.getElementById('img-hdr');
            const rptHeader = document.querySelector('.rpt-header');

            // Mostrar header de imagen, ocultar controles
            imgHdr.style.display = 'block';
            rptHeader.style.display = 'none';

            try {
                const canvas = await html2canvas(el, {
                    backgroundColor: '#0f1117',
                    scale: 2,
                    useCORS: true,
                    logging: false,
                });

                // Descargar
                const link = document.createElement('a');
                const fecha = inp.value.replace(/-/g, '');
                link.download = `parte-diario-${fecha}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert('Error al generar imagen: ' + err.message);
            } finally {
                imgHdr.style.display = 'none';
                rptHeader.style.display = 'flex';
            }
        };
    </script>
</body>
</html>

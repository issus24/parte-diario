<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinacion - Parte Diario</title>
    <meta name="theme-color" content="#0f1117">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>&#128668; Parte Diario</h1>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/coordinacion.html" class="active">Coordinacion</a>
            <a href="/taller.html">Taller</a>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-sin-asignar">-</div>
                <div class="stat-label">Pend. de ingreso</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-por-confirmar">-</div>
                <div class="stat-label">Por confirmar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-en-taller">-</div>
                <div class="stat-label">En taller</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-operativos">-</div>
                <div class="stat-label">Operativos</div>
            </div>
        </div>

        <!-- Header -->
        <div class="page-header">
            <h2 class="page-title">Recepcion de Partes</h2>
            <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo Parte</button>
        </div>

        <!-- Tabla de partes recibidos -->
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>N&#176;</th>
                            <th>DOMINIO</th>
                            <th class="col-expand">PROBLEMAS REPORTADOS</th>
                            <th>FECHA INGRESO</th>
                            <th>ESTADO</th>
                            <th>ACCI&#211;N</th>
                        </tr>
                        <tr class="filter-row">
                            <td></td>
                            <td><input type="text" class="filter-input" id="filtro-dominio" placeholder="Filtrar..."></td>
                            <td></td>
                            <td></td>
                            <td>
                                <select class="filter-input" id="filtro-estado">
                                    <option value="">Todos</option>
                                    <option value="sin-fecha">Sin fecha</option>
                                    <option value="por-confirmar">Por confirmar</option>
                                    <option value="en-taller">En taller</option>
                                    <option value="Operativo">Operativo</option>
                                </select>
                            </td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody id="tabla-partes">
                        <tr><td colspan="9" class="loading-center"><div class="spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="table-footer">
                <span id="tabla-count" class="text-muted">-</span>
            </div>
        </div>
    </div>

    <!-- Modal: Nuevo Parte -->
    <div class="modal-overlay" id="modal-nuevo">
        <div class="modal" style="max-width:650px;">
            <div class="modal-header">
                <h3>Nuevo Parte</h3>
                <button class="modal-close" onclick="cerrarModal('modal-nuevo')">&times;</button>
            </div>
            <div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                    <div class="form-group">
                        <label>Dominio (Patente)</label>
                        <input type="text" class="form-control" id="nuevo-dominio" placeholder="ABC 123">
                    </div>
                    <div class="form-group">
                        <label>Operacion</label>
                        <input type="text" class="form-control" id="nuevo-operacion" value="BASE TT">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem;">
                    <div class="form-group">
                        <label>T. de Reparacion</label>
                        <select class="form-control" id="nuevo-tipo-rep">
                            <option value="RAPIDA">Rapida</option>
                            <option value="LENTA">Lenta</option>
                            <option value="PROFUNDA">Profunda</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Taller</label>
                        <select class="form-control" id="nuevo-tipo-taller" onchange="toggleTallerExterno()">
                            <option value="INTERNO">Interno</option>
                            <option value="EXTERNO">Externo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Taller / Box</label>
                        <select class="form-control" id="nuevo-taller-box">
                            <option value="MECANICA">Mecanica</option>
                            <option value="ELECTRICIDAD">Electricidad</option>
                            <option value="HERRERIA">Herreria</option>
                            <option value="CHAPA/PINTURA">Chapa/Pintura</option>
                            <option value="GOMERIA">Gomeria</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="grupo-taller-externo" style="display:none;">
                    <label>Nombre del Taller Externo</label>
                    <input type="text" class="form-control" id="nuevo-taller-externo" placeholder="Ej: IVECAM E.E.">
                </div>
                <div class="form-group">
                    <label>Fecha de Ingreso a Taller</label>
                    <input type="date" class="form-control" id="nuevo-fecha-ingreso">
                </div>
                <div class="form-group">
                    <label>Novedad Completa de la Unidad</label>
                    <textarea class="form-control" id="nuevo-novedad" rows="3" placeholder="Descripcion del desperfecto o trabajo necesario..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modal-nuevo')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarNuevo()">Crear Parte</button>
            </div>
        </div>
    </div>

    <!-- Modal: Asignar fecha -->
    <div class="modal-overlay" id="modal-asignar">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3>Asignar ingreso a taller</h3>
                <button class="modal-close" onclick="cerrarModal('modal-asignar')">&times;</button>
            </div>
            <div>
                <p style="margin-bottom:0.75rem; font-size:0.85rem;">
                    Parte: <strong id="asignar-nparte"></strong> |
                    Dominio: <strong id="asignar-dominio"></strong>
                </p>
                <div id="asignar-problemas" style="margin-bottom:0.75rem;"></div>
                <div class="form-group">
                    <label>Fecha de ingreso a taller</label>
                    <input type="date" class="form-control" id="asignar-fecha">
                </div>
                <div class="form-group">
                    <label>Tipo de taller</label>
                    <select class="form-control" id="asignar-tipo-taller" onchange="toggleAsignarExterno()">
                        <option value="INTERNO">Interno</option>
                        <option value="EXTERNO">Externo</option>
                    </select>
                </div>
                <div class="form-group" id="asignar-grupo-externo" style="display:none;">
                    <label>Nombre del taller externo</label>
                    <input type="text" class="form-control" id="asignar-taller-externo" placeholder="Ej: IVECAM E.E., DISTRISERVICE...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modal-asignar')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarAsignacion()">Asignar</button>
            </div>
        </div>
    </div>

    <script type="module" src="/assets/js/coordinacion.js"></script>
</body>
</html>

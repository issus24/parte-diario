<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinacion - Parte Diario</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>&#128668; Parte Diario</h1>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/coordinacion.html" class="active">Coordinacion</a>
            <a href="/taller.html">Taller</a>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-pendientes">-</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-en-proceso">-</div>
                <div class="stat-label">En proceso</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-en-espera">-</div>
                <div class="stat-label">En espera</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-operativos">-</div>
                <div class="stat-label">Operativos</div>
            </div>
        </div>

        <!-- Header + acciones -->
        <div class="page-header">
            <h2 class="page-title">Unidades en taller</h2>
            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                <input type="text" class="form-control" id="filtro-dominio" placeholder="Buscar dominio..." style="width:180px;">
                <select class="form-control" id="filtro-tipo-taller" style="width:140px;">
                    <option value="">Todos</option>
                    <option value="INTERNO">Internos</option>
                    <option value="EXTERNO">Externos</option>
                </select>
                <select class="form-control" id="filtro-estado" style="width:140px;">
                    <option value="">Todos los estados</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Proceso">En Proceso</option>
                    <option value="En Espera">En Espera</option>
                    <option value="Operativo">Operativo</option>
                </select>
                <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nueva Unidad</button>
            </div>
        </div>

        <!-- Tabs interno/externo -->
        <div class="tabs" style="margin-bottom:1rem;">
            <button class="tab-btn active" data-tab="todos" onclick="cambiarTab('todos')">Todos</button>
            <button class="tab-btn" data-tab="internos" onclick="cambiarTab('internos')">Talleres Internos</button>
            <button class="tab-btn" data-tab="externos" onclick="cambiarTab('externos')">Talleres Externos</button>
            <button class="tab-btn" data-tab="operativos" onclick="cambiarTab('operativos')">Operativos</button>
        </div>

        <!-- Tabla de partes -->
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>N&#176;</th>
                            <th>Dominio</th>
                            <th>Novedad</th>
                            <th>Taller/Box</th>
                            <th>T. Rep.</th>
                            <th>Ingreso</th>
                            <th>Fin Est.</th>
                            <th>Estado</th>
                            <th>Accion</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-partes">
                        <tr><td colspan="9" class="loading-center"><div class="spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal: Nueva Unidad -->
    <div class="modal-overlay" id="modal-nuevo">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3>Nueva Unidad</h3>
                <button class="modal-close" onclick="cerrarModal('modal-nuevo')">&times;</button>
            </div>
            <div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Dominio (Patente)</label>
                        <input type="text" class="form-control" id="nuevo-dominio" placeholder="ABC 123">
                    </div>
                    <div class="form-group">
                        <label>Operacion</label>
                        <input type="text" class="form-control" id="nuevo-operacion" value="BASE TT">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Tipo de Reparacion</label>
                        <select class="form-control" id="nuevo-tipo-rep">
                            <option value="RAPIDA">Rapida</option>
                            <option value="LENTA">Lenta</option>
                            <option value="PROFUNDA">Profunda</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Taller</label>
                        <select class="form-control" id="nuevo-tipo-taller" onchange="toggleTallerExterno()">
                            <option value="INTERNO">Interno</option>
                            <option value="EXTERNO">Externo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Taller / Box</label>
                        <select class="form-control" id="nuevo-taller-box">
                            <option value="MECANICA">Mecanica</option>
                            <option value="ELECTRICIDAD">Electricidad</option>
                            <option value="HERRERIA">Herreria</option>
                            <option value="CHAPA/PINTURA">Chapa/Pintura</option>
                            <option value="GOMERIA">Gomeria</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="grupo-taller-externo" style="display:none;">
                    <label>Nombre del Taller Externo</label>
                    <input type="text" class="form-control" id="nuevo-taller-externo" placeholder="Ej: IVECAM E.E.">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Fecha de Ingreso</label>
                        <input type="date" class="form-control" id="nuevo-fecha-ingreso">
                    </div>
                    <div class="form-group">
                        <label>Fecha Probable Finalizacion</label>
                        <input type="date" class="form-control" id="nuevo-fecha-fin">
                    </div>
                </div>
                <div class="form-group">
                    <label>Novedad Completa de la Unidad</label>
                    <textarea class="form-control" id="nuevo-novedad" rows="3" placeholder="Descripcion del trabajo a realizar..."></textarea>
                </div>
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea class="form-control" id="nuevo-observaciones" rows="2" placeholder="Observaciones adicionales..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modal-nuevo')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarNuevo()">Crear</button>
            </div>
        </div>
    </div>

    <!-- Modal: Editar/Ver Parte -->
    <div class="modal-overlay" id="modal-editar">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3 id="modal-editar-titulo">Detalle</h3>
                <button class="modal-close" onclick="cerrarModal('modal-editar')">&times;</button>
            </div>
            <div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-bottom:1rem;">
                    <div>
                        <label class="form-label-sm">Dominio</label>
                        <div id="edit-dominio" style="font-weight:700; font-family:monospace; font-size:1.1rem;"></div>
                    </div>
                    <div>
                        <label class="form-label-sm">Operacion</label>
                        <div id="edit-operacion"></div>
                    </div>
                    <div>
                        <label class="form-label-sm">Tipo Taller</label>
                        <div id="edit-tipo-taller"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select class="form-control" id="edit-estado"></select>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Tipo de Reparacion</label>
                        <select class="form-control" id="edit-tipo-rep">
                            <option value="RAPIDA">Rapida</option>
                            <option value="LENTA">Lenta</option>
                            <option value="PROFUNDA">Profunda</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Taller / Box</label>
                        <select class="form-control" id="edit-taller-box">
                            <option value="MECANICA">Mecanica</option>
                            <option value="ELECTRICIDAD">Electricidad</option>
                            <option value="HERRERIA">Herreria</option>
                            <option value="CHAPA/PINTURA">Chapa/Pintura</option>
                            <option value="GOMERIA">Gomeria</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Fecha Probable Finalizacion</label>
                    <input type="date" class="form-control" id="edit-fecha-fin">
                </div>
                <div class="form-group">
                    <label>Novedad</label>
                    <textarea class="form-control" id="edit-novedad" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea class="form-control" id="edit-observaciones" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modal-editar')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module" src="/assets/js/coordinacion.js"></script>
</body>
</html>

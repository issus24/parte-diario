<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller - Parte Diario</title>
    <meta name="theme-color" content="#0f1117">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>&#128668; Parte Diario</h1>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/coordinacion.html">Coordinacion</a>
            <a href="/taller.html" class="active">Taller</a>
            <a href="/reporte.html">Reporte</a>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-pendientes">-</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-en-proceso">-</div>
                <div class="stat-label">En proceso</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-en-espera">-</div>
                <div class="stat-label">En espera</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-operativos">-</div>
                <div class="stat-label">Operativos</div>
            </div>
        </div>

        <!-- Header -->
        <div class="page-header">
            <h2 class="page-title">Parte Diario de Taller</h2>
        </div>

        <!-- Tabs -->
        <div class="tabs" style="margin-bottom:1rem;">
            <button class="tab-btn active" data-tab="internos" onclick="cambiarTab('internos')">Taller Interno <span id="tab-count-internos"></span></button>
            <button class="tab-btn" data-tab="externos" onclick="cambiarTab('externos')">Taller Externo <span id="tab-count-externos"></span></button>
            <button class="tab-btn" data-tab="pendientes" onclick="cambiarTab('pendientes')">Pendientes Ingreso <span id="tab-count-pendientes"></span></button>
            <button class="tab-btn" data-tab="operativos" onclick="cambiarTab('operativos')">Operativo <span id="tab-count-operativos"></span></button>
        </div>

        <!-- Tabla Desktop -->
        <div class="card desktop-table">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="col-shrink">N&#176;</th>
                            <th class="col-shrink">INGRESO</th>
                            <th class="col-shrink">FIN EST.</th>
                            <th class="col-shrink">DOMINIO</th>
                            <th class="col-shrink">OP.</th>
                            <th class="col-shrink">REP.</th>
                            <th class="col-expand">NOVEDAD COMPLETA DE LA UNIDAD</th>
                            <th class="col-shrink">TALLER</th>
                            <th class="col-shrink">ESTADO</th>
                            <th class="col-expand">OBSERVACIONES</th>
                            <th class="col-shrink">ACC.</th>
                        </tr>
                        <tr class="filter-row">
                            <td></td>
                            <td></td>
                            <td></td>
                            <td><input type="text" class="filter-input" id="filtro-dominio" placeholder="Filtrar..."></td>
                            <td></td>
                            <td>
                                <select class="filter-input" id="filtro-tipo-rep">
                                    <option value="">Todos</option>
                                    <option value="RAPIDA">Rapida</option>
                                    <option value="LENTA">Lenta</option>
                                    <option value="PROFUNDA">Profunda</option>
                                </select>
                            </td>
                            <td></td>
                            <td>
                                <select class="filter-input" id="filtro-taller">
                                    <option value="">Todos</option>
                                    <option value="MECANICA">Mecanica</option>
                                    <option value="ELECTRICIDAD">Electricidad</option>
                                    <option value="HERRERIA">Herreria</option>
                                    <option value="CHAPA/PINTURA">Chapa/Pint.</option>
                                    <option value="GOMERIA">Gomeria</option>
                                </select>
                            </td>
                            <td>
                                <select class="filter-input" id="filtro-estado">
                                    <option value="">Todos</option>
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="En Proceso">En Proceso</option>
                                    <option value="En Espera">En Espera</option>
                                </select>
                            </td>
                            <td></td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody id="tabla-taller">
                        <tr><td colspan="11" class="loading-center"><div class="spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="table-footer">
                <span id="tabla-count" class="text-muted">-</span>
            </div>
        </div>

        <!-- Tablet Card View -->
        <div class="tablet-cards" id="tablet-cards"></div>
    </div>

    <!-- Modal: Editar Parte -->
    <div class="modal-overlay" id="modal-editar">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3 id="modal-editar-titulo">Detalle</h3>
                <button class="modal-close" onclick="cerrarModal('modal-editar')">&times;</button>
            </div>
            <div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem; margin-bottom:0.75rem;">
                    <div>
                        <label class="form-label-sm">Dominio</label>
                        <div id="edit-dominio" style="font-weight:700; font-family:monospace; font-size:1rem;"></div>
                    </div>
                    <div>
                        <label class="form-label-sm">Operacion</label>
                        <div id="edit-operacion" style="font-size:0.85rem;"></div>
                    </div>
                    <div>
                        <label class="form-label-sm">Taller</label>
                        <div id="edit-tipo-taller" style="font-size:0.85rem;"></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem;">
                    <div class="form-group">
                        <label>Estado</label>
                        <select class="form-control" id="edit-estado"></select>
                    </div>
                    <div class="form-group">
                        <label>T. de Reparacion</label>
                        <select class="form-control" id="edit-tipo-rep">
                            <option value="RAPIDA">Rapida</option>
                            <option value="LENTA">Lenta</option>
                            <option value="PROFUNDA">Profunda</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Taller / Box</label>
                        <select class="form-control" id="edit-taller-box">
                            <option value="MECANICA">Mecanica</option>
                            <option value="ELECTRICIDAD">Electricidad</option>
                            <option value="HERRERIA">Herreria</option>
                            <option value="CHAPA/PINTURA">Chapa/Pintura</option>
                            <option value="GOMERIA">Gomeria</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Fecha Probable Finalizacion</label>
                    <input type="date" class="form-control" id="edit-fecha-fin">
                </div>
                <div class="form-group">
                    <label>Novedad Completa</label>
                    <textarea class="form-control" id="edit-novedad" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea class="form-control" id="edit-observaciones" rows="3"></textarea>
                </div>
                <!-- Desperfectos individuales -->
                <div id="edit-desperfectos" style="margin-top:0.75rem;"></div>
            </div>
            <div class="modal-footer" style="justify-content:space-between;">
                <button class="btn btn-success" id="btn-todo-reparado" onclick="todoReparado()" style="gap:0.4rem;">&#9989; Todo Reparado</button>
                <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-outline" onclick="cerrarModal('modal-editar')">Cancelar</button>
                    <button class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/assets/js/taller.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller - Parte Diario</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>&#128668; Parte Diario</h1>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/coordinacion.html">Coordinacion</a>
            <a href="/taller.html" class="active">Taller</a>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid" id="stats-taller">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">-</div>
                <div class="stat-label">Unidades en taller</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-pendientes">-</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-en-proceso">-</div>
                <div class="stat-label">En proceso</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-operativos">-</div>
                <div class="stat-label">Operativos hoy</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="page-header">
            <h2 class="page-title">Parte Diario de Taller</h2>
            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                <input type="text" class="form-control" id="filtro-dominio" placeholder="Buscar dominio..." style="width:180px;">
                <select class="form-control" id="filtro-taller-box" style="width:160px;">
                    <option value="">Todos los sectores</option>
                    <option value="MECANICA">Mecanica</option>
                    <option value="ELECTRICIDAD">Electricidad</option>
                    <option value="HERRERIA">Herreria</option>
                    <option value="CHAPA/PINTURA">Chapa/Pintura</option>
                    <option value="GOMERIA">Gomeria</option>
                </select>
            </div>
        </div>

        <!-- Unidades activas -->
        <div id="unidades-container">
            <div class="loading-center"><div class="spinner"></div></div>
        </div>

        <!-- Operativos del dia -->
        <div style="margin-top: 2rem;">
            <button class="btn btn-outline" onclick="toggleOperativos()" id="btn-operativos" style="display:none;">
                &#9660; Ver unidades operativas
            </button>
            <div id="operativos-container" style="display:none; margin-top:1rem;"></div>
        </div>
    </div>

    <script type="module" src="/assets/js/taller.js"></script>
</body>
</html>

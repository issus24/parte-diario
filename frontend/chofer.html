<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chofer - Parte Diario</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        .chofer-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1rem;
        }
        .chofer-header {
            text-align: center;
            padding: 1rem 0;
        }
        .chofer-header h2 { font-size: 1.1rem; margin-top: 0.5rem; }
        .chofer-header p { font-size: 0.8rem; color: var(--text-muted); }

        .form-section { margin-bottom: 1.25rem; }
        .form-section label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .form-control-lg {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text);
            background: var(--bg-input);
        }
        .form-control-lg:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
        .form-control-lg::placeholder { color: var(--text-muted); }
        textarea.form-control-lg { resize: vertical; min-height: 80px; font-family: inherit; }

        /* Media section */
        .media-section { margin-bottom: 1.25rem; }
        .media-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.5rem; }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .media-thumb {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .media-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .media-thumb .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .media-btn:hover { border-color: var(--primary); color: var(--primary); }
        .media-btn .icon { font-size: 1.2rem; }

        /* Audio */
        .audio-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.5rem; }
        .audio-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .audio-item audio { flex: 1; height: 32px; }
        .audio-item .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
        }

        .rec-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .rec-btn:hover { border-color: var(--primary); color: var(--primary); }
        .rec-btn.recording {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-light);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Submit */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        .submit-btn:hover { background: var(--primary-dark); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Success */
        .success-screen {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
        }
        .success-screen.active { display: block; }
        .success-icon { font-size: 4rem; margin-bottom: 1rem; }
        .success-screen h2 { color: var(--primary); margin-bottom: 0.5rem; }
        .success-screen p { color: var(--text-muted); margin-bottom: 1.5rem; }

        #form-container.hidden { display: none; }

        /* Hide file input */
        .hidden-input { display: none; }

        /* Categorizador */
        .sector-suggestion {
            display: none;
            margin-bottom: 1.25rem;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .sector-suggestion.active { display: block; }
        .sector-suggestion .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.5rem;
        }
        .sector-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .sector-chip {
            padding: 0.4rem 0.85rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .sector-chip:hover { border-color: var(--primary); color: var(--text); }
        .sector-chip.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }
        .sector-confidence {
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Problemas list */
        .problemas-list { margin-bottom: 1rem; }
        .problema-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            position: relative;
        }
        .problema-card .problema-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }
        .problema-card .problema-num {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .problema-card .problema-remove {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 0.25rem;
        }
        .problema-card .problema-text {
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 0.3rem;
        }
        .problema-card .problema-sector {
            font-size: 0.7rem;
        }

        .add-problema-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.6rem;
            border: 2px dashed var(--primary);
            border-radius: 8px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 1.25rem;
        }
        .add-problema-btn:hover { background: rgba(34,197,94,0.2); }

        .problema-input-area {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>&#128668; Parte Diario</h1>
        <a href="/" style="color:var(--text-muted); text-decoration:none; font-size:0.8rem;">Inicio</a>
    </nav>

    <div class="chofer-container">
        <div class="chofer-header">
            <div style="font-size:2.5rem;">&#128666;</div>
            <h2>Reportar Desperfecto</h2>
            <p>Completa el formulario para generar un parte</p>
        </div>

        <!-- Form -->
        <div id="form-container">
            <div class="form-section">
                <label>Dominio (Patente)</label>
                <input type="text" class="form-control-lg" id="inp-dominio" placeholder="Ej: ABC 123" autocapitalize="characters">
            </div>

            <div class="form-section">
                <label>Tu Nombre</label>
                <input type="text" class="form-control-lg" id="inp-nombre" placeholder="Nombre del chofer">
            </div>

            <!-- Problemas agregados -->
            <div class="form-section">
                <label>Problemas reportados</label>
                <div class="problemas-list" id="problemas-list"></div>

                <!-- Input para agregar problema -->
                <div class="problema-input-area">
                    <textarea class="form-control-lg" id="inp-novedad" rows="2" placeholder="Describe el desperfecto..." style="margin-bottom:0.5rem;"></textarea>

                    <!-- Sector sugerido -->
                    <div class="sector-suggestion" id="sector-suggestion">
                        <div class="label">Especialidad detectada</div>
                        <div class="sector-chips" id="sector-chips"></div>
                        <div class="sector-confidence" id="sector-confidence"></div>
                    </div>

                    <button type="button" class="add-problema-btn" onclick="agregarProblema()">
                        + Agregar problema
                    </button>
                </div>
            </div>

            <!-- Fotos -->
            <div class="media-section">
                <div class="media-label">Fotos</div>
                <div class="media-grid" id="fotos-grid"></div>
                <button type="button" class="media-btn" onclick="document.getElementById('foto-input').click()">
                    <span class="icon">&#128247;</span> Tomar Foto
                </button>
                <input type="file" accept="image/*" capture="environment" class="hidden-input" id="foto-input" onchange="agregarFoto(this)" multiple>
            </div>

            <!-- Audio -->
            <div class="media-section">
                <div class="media-label">Notas de Voz</div>
                <div class="audio-list" id="audio-list"></div>
                <button type="button" class="rec-btn" id="rec-btn" onclick="toggleGrabacion()">
                    <span class="icon">&#127908;</span> <span id="rec-text">Grabar Audio</span>
                </button>
            </div>

            <button type="button" class="submit-btn" id="submit-btn" onclick="enviarParte()">
                Enviar Parte
            </button>
        </div>

        <!-- Success -->
        <div class="success-screen" id="success-screen">
            <div class="success-icon">&#9989;</div>
            <h2>Parte Enviado</h2>
            <p>N&#176; <strong id="success-nparte"></strong></p>
            <p>Tu reporte fue recibido. Coordinacion lo revisara.</p>
            <button class="submit-btn" onclick="resetForm()">Crear Otro Parte</button>
        </div>
    </div>

    <script type="module">
        import { categorizar, SECTORES } from '/assets/js/categorizador.js';

        let sectorSeleccionado = null;
        let debounceTimer = null;
        let problemas = []; // { texto, sector }

        // --- CATEGORIZADOR ---
        const inputNovedad = document.getElementById('inp-novedad');
        inputNovedad.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const texto = inputNovedad.value.trim();
                if (texto.length < 5) {
                    document.getElementById('sector-suggestion').classList.remove('active');
                    sectorSeleccionado = null;
                    return;
                }

                const resultado = categorizar(texto);
                sectorSeleccionado = resultado.sector;
                mostrarSugerencia(resultado);
            }, 400);
        });

        // --- PROBLEMAS ---
        window.agregarProblema = function() {
            const texto = inputNovedad.value.trim();
            if (!texto) return alert('Escribi una descripcion del problema');

            problemas.push({ texto, sector: sectorSeleccionado || 'MECANICA' });
            inputNovedad.value = '';
            sectorSeleccionado = null;
            document.getElementById('sector-suggestion').classList.remove('active');
            renderProblemas();
            inputNovedad.focus();
        };

        window.quitarProblema = function(i) {
            problemas.splice(i, 1);
            renderProblemas();
        };

        function renderProblemas() {
            const container = document.getElementById('problemas-list');
            if (problemas.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); font-size:0.8rem; text-align:center; padding:0.5rem;">Sin problemas agregados</p>';
                return;
            }
            container.innerHTML = problemas.map((p, i) => {
                const sectorColor = p.sector === 'ELECTRICIDAD' ? 'warning'
                    : p.sector === 'HERRERIA' ? 'muted'
                    : p.sector === 'GOMERIA' ? 'success' : 'info';
                return `
                <div class="problema-card">
                    <div class="problema-header">
                        <span class="problema-num">Problema ${i + 1}</span>
                        <button class="problema-remove" onclick="quitarProblema(${i})">&times;</button>
                    </div>
                    <div class="problema-text">${p.texto}</div>
                    <span class="badge badge-${sectorColor}">${p.sector}</span>
                </div>`;
            }).join('');
        }

        renderProblemas();

        function mostrarSugerencia(resultado) {
            const container = document.getElementById('sector-suggestion');
            const chipsEl = document.getElementById('sector-chips');
            const confEl = document.getElementById('sector-confidence');

            // Armar chips: primero el sugerido, luego alternativas, luego el resto
            const orden = [resultado.sector, ...resultado.alternativas, ...SECTORES.filter(s =>
                s !== resultado.sector && !resultado.alternativas.includes(s)
            )];

            chipsEl.innerHTML = orden.map(s => {
                const selected = s === sectorSeleccionado ? 'selected' : '';
                return `<button type="button" class="sector-chip ${selected}" onclick="window.seleccionarSector('${s}')">${s}</button>`;
            }).join('');

            if (resultado.confianza > 0) {
                confEl.textContent = `${resultado.confianza}% de confianza`;
            } else {
                confEl.textContent = 'No se pudo determinar. Selecciona manualmente.';
            }

            container.classList.add('active');
        }

        window.seleccionarSector = function(sector) {
            sectorSeleccionado = sector;
            document.querySelectorAll('.sector-chip').forEach(chip => {
                chip.classList.toggle('selected', chip.textContent === sector);
            });
        };

        // --- FOTOS ---
        let fotos = []; // array de Blobs

        window.agregarFoto = function(input) {
            for (const file of input.files) {
                comprimirImagen(file).then(blob => {
                    fotos.push(blob);
                    renderFotos();
                });
            }
            input.value = '';
        }

        function comprimirImagen(file) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 1200;
                    const scale = Math.min(1, maxW / img.width);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(resolve, 'image/jpeg', 0.7);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        function renderFotos() {
            const grid = document.getElementById('fotos-grid');
            grid.innerHTML = fotos.map((blob, i) => `
                <div class="media-thumb">
                    <img src="${URL.createObjectURL(blob)}">
                    <button class="remove-btn" onclick="quitarFoto(${i})">&times;</button>
                </div>
            `).join('');
        }

        window.quitarFoto = function(i) {
            fotos.splice(i, 1);
            renderFotos();
        }

        // --- AUDIO ---
        let audios = []; // array of Blobs
        let mediaRecorder = null;
        let audioChunks = [];
        let grabando = false;

        window.toggleGrabacion = function() {
            if (grabando) {
                detenerGrabacion();
            } else {
                iniciarGrabacion();
            }
        }

        async function iniciarGrabacion() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                    ? 'audio/webm;codecs=opus' : 'audio/webm';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    audios.push(blob);
                    renderAudios();
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                grabando = true;
                document.getElementById('rec-btn').classList.add('recording');
                document.getElementById('rec-text').textContent = 'Detener Grabacion';
            } catch (err) {
                alert('No se pudo acceder al microfono');
            }
        }

        function detenerGrabacion() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            grabando = false;
            document.getElementById('rec-btn').classList.remove('recording');
            document.getElementById('rec-text').textContent = 'Grabar Audio';
        }

        function renderAudios() {
            const list = document.getElementById('audio-list');
            list.innerHTML = audios.map((blob, i) => `
                <div class="audio-item">
                    <audio controls src="${URL.createObjectURL(blob)}"></audio>
                    <button class="remove-btn" onclick="quitarAudio(${i})">&times;</button>
                </div>
            `).join('');
        }

        window.quitarAudio = function(i) {
            audios.splice(i, 1);
            renderAudios();
        }

        // --- ENVIAR ---
        window.enviarParte = async function() {
            const dominio = document.getElementById('inp-dominio').value.trim();
            const nombre = document.getElementById('inp-nombre').value.trim();
            const novedad = document.getElementById('inp-novedad').value.trim();

            // Si hay texto pendiente en el input, agregarlo como problema
            if (novedad) {
                problemas.push({ texto: novedad, sector: sectorSeleccionado || 'MECANICA' });
            }

            if (!dominio) return alert('Ingresa el dominio (patente)');
            if (problemas.length === 0) return alert('Agrega al menos un problema');

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const formData = new FormData();
                // Novedad = resumen de todos los problemas
                const novedadCompleta = problemas.map(p => p.texto).join('. ');
                // Taller box = sector del primer problema (o el más frecuente)
                const sectores = problemas.map(p => p.sector);
                const sectorPrincipal = sectores.sort((a,b) =>
                    sectores.filter(v => v===b).length - sectores.filter(v => v===a).length
                )[0] || 'MECANICA';

                formData.append('dominio', dominio);
                formData.append('chofer_nombre', nombre);
                formData.append('novedad', novedadCompleta);
                formData.append('taller_box', sectorPrincipal);
                formData.append('problemas', JSON.stringify(problemas));

                fotos.forEach((blob, i) => {
                    formData.append('fotos', blob, `foto_${i}.jpg`);
                });
                audios.forEach((blob, i) => {
                    formData.append('audios', blob, `audio_${i}.webm`);
                });

                const res = await fetch('/api/partes/chofer', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Error al enviar');
                }

                const data = await res.json();
                document.getElementById('success-nparte').textContent = data.n_parte;
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-screen').classList.add('active');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar Parte';
            }
        }

        window.resetForm = function() {
            document.getElementById('inp-dominio').value = '';
            document.getElementById('inp-nombre').value = '';
            document.getElementById('inp-novedad').value = '';
            fotos = [];
            audios = [];
            renderFotos();
            renderAudios();
            problemas = [];
            sectorSeleccionado = null;
            renderProblemas();
            document.getElementById('sector-suggestion').classList.remove('active');
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('success-screen').classList.remove('active');
        }

        // PWA: register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
